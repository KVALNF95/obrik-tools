# obrik_flash.cfg — конфиг для утилиты obrik_flash.py
#
# Пути можно менять в соответствии с реальным расположением файлов.

# загрузчик (DFU) — прошивается один раз при сборке полётника
bootloader   = ~/Documents/Applications/px4/matek_h743-slim_bootloader.bin

# основная прошивка PX4 (с драйвером dshot_4way)
firmware     = ~/Documents/Applications/px4/PX4-Autopilot/build/matek_h743-slim_default/matek_h743-slim_default.px4

# файл параметров для заливки в QGC
params_file  = /home/vladimir/Documents/projects-sverk/params/Optical_flow.params

# путь к инструментам PX4 (где лежит px_uploader.py)
px4_tools    = ~/Documents/Applications/px4/PX4-Autopilot/Tools

# адрес flash для загрузчика
dfu_address  = 0x08000000

# скорость MAVLink
baud         = 57600

# значение Beacon Delay (1=1m..4=10m, 5=Infinite)
beacon_value = 5

# количество моторов/ESC
num_motors   = 4
