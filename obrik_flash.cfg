# obrik_flash.cfg — конфиг для утилиты obrik_flash.py
#
# Пути можно менять в соответствии с реальным расположением файлов.

# загрузчик (DFU) — прошивается один раз при сборке полётника
bootloader   = /home/vladimir/px4/boards/matek/h743-slim/extras/matek_h743-slim_bootloader.bin

# основная прошивка PX4 (с драйвером dshot_4way) — .px4 для px_uploader
firmware     = /home/vladimir/px4/build/matek_h743-slim_default/matek_h743-slim_default.px4

# прошивка в формате .bin для прямой заливки через DFU (если не указано — ищется рядом с .px4)
firmware_bin = /home/vladimir/px4/build/matek_h743-slim_default/matek_h743-slim_default.bin

# файл параметров для заливки в QGC
params_file  = /home/vladimir/Documents/Обрик/Прошивка полётника/Optical_flow_ros2.params

# путь к инструментам PX4 (где лежит px_uploader.py)
px4_tools    = /home/vladimir/px4/Tools

# адрес flash для загрузчика
dfu_address  = 0x08000000

# адрес flash для основной прошивки (APP_LOAD_ADDRESS из hw_config.h)
app_address  = 0x08020000

# скорость MAVLink
baud         = 57600

# значение Beacon Delay (1=1m..4=10m, 5=Infinite)
beacon_value = 5

# количество моторов/ESC
num_motors   = 4
